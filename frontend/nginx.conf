server {
    listen 80;

    # React SPA
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    # Backend API — "backend" resolves via the docker-compose network
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        # Whisper transcription of longer dictations can take a while on CPU
        proxy_read_timeout 300s;
        client_max_body_size 25m;   # audio blobs
    }
}
