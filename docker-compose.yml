# QuickRx Voice — one-command deployment:  docker compose up --build
# Frontend: http://localhost:8080  (nginx, proxies /api/v1 to the backend)
# Backend:  http://localhost:8000  (FastAPI + Whisper, exposed for API docs)
#
# Always-on hosted deployment (VPS, automatic HTTPS) — adds the caddy service:
#   cp .env.example .env   &&   edit SITE_ADDRESS
#   docker compose --profile prod up -d --build
#   → whole app served at https://$SITE_ADDRESS/  (see DEPLOYMENT.md, Part 6)
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - whisper-models:/models   # Whisper model cache — downloaded once
      - quickrx-data:/data       # SQLite DB — sessions survive restarts
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Production ingress: terminates TLS (automatic Let's Encrypt) and proxies to
  # the frontend, which already proxies /api/v1 to the backend — so the whole
  # app is same-origin over HTTPS. Only runs with `--profile prod`.
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Domain (or <server-ip>.sslip.io) Caddy serves on; set in .env for prod.
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # persisted TLS certificates
      - caddy-config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  whisper-models:
  quickrx-data:
  caddy-data:
  caddy-config:
